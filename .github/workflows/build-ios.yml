name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build iOS app
        run: |
          pnpm tauri ios build --target aarch64 -- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Find app and package IPA
        run: |
          # Look in DerivedData for the built .app
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | head -1)

          # Fallback: check xcarchive
          if [ -z "$APP" ]; then
            ARCHIVE=$(find . -name "*.xcarchive" | head -1)
            APP=$(find "$ARCHIVE" -name "*.app" | head -1)
          fi

          echo "Found app at: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r openwhoop-app.ipa Payload/
          echo "IPA size: $(du -sh openwhoop-app.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhoop-app-ios
          path: openwhoop-app.ipa
          retention-days: 7
