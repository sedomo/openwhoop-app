name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        run: pnpm install --config.dangerouslyAllowAllBuilds=true

      - name: Patch Xcode project to disable signing
        run: |
          python3 << 'PYEOF'
          import re

          pbxproj = 'src-tauri/gen/apple/openwhoop-app.xcodeproj/project.pbxproj'
          with open(pbxproj, 'r') as f:
              content = f.read()

          # Clear the hardcoded development team ID
          content = re.sub(r'DEVELOPMENT_TEAM = [A-Z0-9]+;', 'DEVELOPMENT_TEAM = "";', content)

          # Switch from automatic to manual signing
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')

          # Inject CODE_SIGNING_ALLOWED = NO next to every DEVELOPMENT_TEAM line
          content = content.replace(
              'DEVELOPMENT_TEAM = "";',
              'CODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tDEVELOPMENT_TEAM = "";'
          )

          with open(pbxproj, 'w') as f:
              f.write(content)

          print("Signing disabled in project.pbxproj")
          PYEOF

      - name: Build iOS app
        continue-on-error: true
        run: pnpm tauri ios build --target aarch64
        env:
          APPLE_DEVELOPMENT_TEAM: "XXXXXXXXXX"

      - name: Find and package IPA
        run: |
          # Tauri may produce an IPA directly
          IPA=$(find . -name "*.ipa" ! -path "*/node_modules/*" | head -1)

          if [ -n "$IPA" ]; then
            echo "IPA found at: $IPA"
            cp "$IPA" openwhoop-app.ipa
          else
            echo "No IPA found, packaging from .app"
            # Check xcarchive first
            ARCHIVE=$(find . -name "*.xcarchive" ! -path "*/node_modules/*" | head -1)
            if [ -n "$ARCHIVE" ]; then
              APP=$(find "$ARCHIVE" -name "*.app" ! -name "*.dSYM" | head -1)
            else
              # Fall back to DerivedData
              APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*iphoneos*" ! -name "*.dSYM" | head -1)
            fi
            echo "App found at: $APP"
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r openwhoop-app.ipa Payload/
          fi

          echo "IPA size: $(du -sh openwhoop-app.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhoop-app-ios
          path: openwhoop-app.ipa
          retention-days: 7
