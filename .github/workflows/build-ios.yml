name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        run: pnpm install --config.dangerouslyAllowAllBuilds=true

      - name: Build frontend
        run: pnpm build

      - name: Build iOS app (xcodebuild, signing disabled)
        run: |
          xcodebuild \
            -workspace src-tauri/gen/apple/openwhoop-app.xcodeproj/project.xcworkspace \
            -scheme openwhoop-app_iOS \
            -sdk iphoneos \
            -configuration release \
            -archivePath "$PWD/openwhoop-app.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          APP=$(find openwhoop-app.xcarchive -name "*.app" | head -1)
          echo "App found at: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r openwhoop-app.ipa Payload/
          echo "IPA size: $(du -sh openwhoop-app.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhoop-app-ios
          path: openwhoop-app.ipa
          retention-days: 7
